<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheek Bakrii Saphaloo &harr; Latin Qubee Translator</title>

<link rel="stylesheet" href="sbs-font-base64.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 2rem;
    background: #f5f5f0;
    color: #222;
  }
  h1 {
    margin: 0 0 0.25rem;
    font-size: 1.6rem;
    color: #1a1a2e;
  }
  .subtitle {
    margin: 0 0 1.5rem;
    font-size: 0.95rem;
    color: #555;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }
  label {
    display: block;
    font-weight: bold;
    margin-bottom: 0.3rem;
    font-size: 0.95rem;
  }
  textarea {
    width: 100%;
    height: 140px;
    font-size: 1.15rem;
    line-height: 1.5;
    font-family: "SheekBakriSaphaloo", "Noto Sans Ethiopic", "Noto Sans", sans-serif;
    padding: 0.6rem;
    border: 2px solid #bbb;
    border-radius: 6px;
    resize: vertical;
    background: #fff;
  }
  textarea:focus {
    outline: none;
    border-color: #4a6fa5;
    box-shadow: 0 0 0 3px rgba(74,111,165,0.15);
  }
  .btn-row {
    margin: 0.8rem 0;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  button {
    padding: 0.55rem 1.2rem;
    font-size: 1rem;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.15s;
  }
  #goBtn    { background: #2d6a4f; color: #fff; }
  #goBtn:hover { background: #1b4332; }
  #valBtn   { background: #4a6fa5; color: #fff; }
  #valBtn:hover { background: #345285; }
  #clearBtn { background: #c1121f; color: #fff; }
  #clearBtn:hover { background: #780000; }
  #dst {
    background: #fafafa;
  }
  #infoBox {
    margin-top: 1rem;
    padding: 0.8rem;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    max-height: 300px;
    overflow: auto;
    font-size: 0.88rem;
    line-height: 1.4;
    min-height: 2rem;
  }
  #infoBox:empty::before {
    content: "Validation results will appear here.";
    color: #999;
    font-style: italic;
  }
  .valid   { background: #d8f3dc; padding: 2px 4px; border-radius: 3px; }
  .invalid { background: #ffd6d6; padding: 2px 4px; border-radius: 3px; }
  .code    { font-family: "Consolas", "Courier New", monospace; background: #eee; padding: 1px 4px; border-radius: 3px; font-size: 0.85rem; }
  .info-line {
    padding: 3px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .info-line:last-child { border-bottom: none; }
  .status-bar {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: #666;
  }
  .status-bar.error { color: #c1121f; }
  .status-bar.ok { color: #2d6a4f; }
</style>
</head>
<body>
<div class="container">
  <h1>Sheek Bakrii Saphaloo &harr; Latin Qubee Translator</h1>
  <p class="subtitle">Type in either script &ndash; direction is detected automatically. Works entirely offline.</p>

  <label for="src">Source text</label>
  <textarea id="src" placeholder="Type Latin Qubee (e.g. maqaanaan) or paste SBS glyphs here&hellip;"></textarea>

  <div class="btn-row">
    <button id="goBtn">&#x25BA; Transliterate (Ctrl+Enter)</button>
    <button id="valBtn">&#x2699; Validate output</button>
    <button id="clearBtn">&#x1F5D1; Clear</button>
  </div>

  <label for="dst">Result</label>
  <textarea id="dst" readonly placeholder="Result will appear here&hellip;"></textarea>

  <div id="infoBox"></div>
  <div id="statusBar" class="status-bar"></div>
</div>

<script src="translator.js"></script>
</body>
</html>
