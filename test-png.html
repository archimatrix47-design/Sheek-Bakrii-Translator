<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNG Save Test</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; }
    button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; }
    #testCanvas { border: 1px solid #ccc; margin-top: 10px; }
    #result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>PNG Save Test</h1>
  <p>Testing basic canvas rendering:</p>
  
  <button id="test1">Test 1: Simple Text (Arial)</button>
  <button id="test2">Test 2: SBS Text</button>
  <button id="test3">Test 3: Full Card</button>
  
  <div id="result"></div>
  <canvas id="testCanvas" style="display:none"></canvas>

  <script>
    function log(msg) {
      document.getElementById('result').innerHTML += '<div>' + msg + '</div>';
    }

    document.getElementById('test1').addEventListener('click', function() {
      log('Test 1: Simple text with Arial font');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 400;
      canvas.height = 100;
      
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = 'black';
      ctx.font = '24px Arial';
      ctx.fillText('Hello World!', 20, 50);
      
      const dataUrl = canvas.toDataURL('image/png');
      log('Data URL length: ' + dataUrl.length);
      
      const link = document.createElement('a');
      link.download = 'test1.png';
      link.href = dataUrl;
      link.click();
      log('Download triggered');
    });

    document.getElementById('test2').addEventListener('click', function() {
      log('Test 2: SBS characters');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 400;
      canvas.height = 100;
      
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = 'black';
      ctx.font = '24px Arial';
      ctx.fillText('SBS Test: ማቃናን ትግርኛ', 20, 50);
      
      const dataUrl = canvas.toDataURL('image/png');
      log('Data URL length: ' + dataUrl.length);
      
      const link = document.createElement('a');
      link.download = 'test2.png';
      link.href = dataUrl;
      link.click();
    });

    document.getElementById('test3').addEventListener('click', function() {
      log('Test 3: Full card');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      const text = 'ማቃናን ትግርኛ አፍርናው አርአይ';
      const fontSize = 28;
      const padding = 40;
      
      ctx.font = fontSize + 'px Arial';
      const textWidth = ctx.measureText(text).width;
      const width = Math.max(800, textWidth + padding * 2 + 20);
      const height = padding * 4 + fontSize * 2 + 60;
      
      canvas.width = width;
      canvas.height = height;
      
      // Background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      
      // Header
      ctx.fillStyle = '#1d1d1f';
      ctx.font = 'bold 16px -apple-system, sans-serif';
      ctx.fillText('Sheek Bakrii Saphaloo', padding, padding + 10);
      
      // Subheader
      ctx.fillStyle = '#86868b';
      ctx.font = '12px -apple-system, sans-serif';
      ctx.fillText('TRANSLATION RESULT', padding, padding + 35);
      
      // Content box
      ctx.fillStyle = '#f5f5f7';
      ctx.fillRect(padding, padding + 50, width - padding * 2, height - padding * 2 - 50);
      
      // Text
      ctx.fillStyle = '#1d1d1f';
      ctx.font = fontSize + 'px Arial';
      ctx.fillText(text, padding + 10, padding + 85);
      
      // Footer
      ctx.fillStyle = '#86868b';
      ctx.font = '12px -apple-system, sans-serif';
      ctx.fillText('Transliterated with Sheek Bakrii Translator', padding, height - padding);
      
      const dataUrl = canvas.toDataURL('image/png');
      log('Generated image: ' + dataUrl.length + ' bytes');
      
      const link = document.createElement('a');
      link.download = 'test3-full-card.png';
      link.href = dataUrl;
      link.click();
      log('Download triggered!');
    });
  </script>
  
  <!-- Vercel Web Analytics -->
  <script src="/analytics.js"></script>
</body>
</html>
